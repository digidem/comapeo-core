syntax = "proto3";

import "keys.proto";

message Invite {
  bytes inviteId = 1;
  bytes projectInviteId = 2;
  string projectName = 3;
  optional string roleName = 4;
  optional string roleDescription = 5;
  string invitorName = 6;
  optional string projectColor = 7;
  optional string projectDescription = 8;
  bool sendStats = 9;
  bool invitorWroteDeviceInfo = 10;
}

message InviteCancel {
  bytes inviteId = 1;
}

message InviteResponse {
  enum Decision {
    DECISION_UNSPECIFIED = 0;
    REJECT = 1;
    ACCEPT = 2;
    ALREADY = 3;
  }
  bytes inviteId = 1;
  Decision decision = 2;
}

message ProjectJoinDetails {
  bytes inviteId = 1;
  bytes projectKey = 2;
  EncryptionKeys encryptionKeys = 3;
}

message DeviceInfo {
  enum DeviceType {
    device_type_unspecified = 0;
    mobile = 1;
    tablet = 2;
    desktop = 3;
  }
  enum RPCFeatures {
    features_unspecified = 0;
    ack = 1;
  }
  string name = 1;
  optional DeviceType deviceType = 2;
  repeated RPCFeatures features = 3;
}

message InviteAck {
  bytes inviteId = 1;
}

message InviteCancelAck {
  bytes inviteId = 1;
}

message InviteResponseAck {
  bytes inviteId = 1;
}

message ProjectJoinDetailsAck {
  bytes inviteId = 1;
}

message MapShareExtension {
  // URLs to map share
  repeated string mapShareUrls = 1;
  // ID of peer that can receive the map share (each map share is linked to a specific device ID)
  bytes receiverDeviceKey = 2;
  // The ID of the map share
  string shareId = 3;
  // The name of the map being shared
  string mapName = 4;
  // The ID of the map being shared
  string mapId = 5;
  // When ths share was created
  uint64 mapShareCreatedAt = 6;
  // When the map was created
  uint64 mapCreatedAt = 7;
  // The bounding box of the map data being shared
  repeated double bounds = 8;
  // The minimum zoom level of the map data being shared
  int32 minzoom = 9;
  // The maximum zoom level of the map data being shared
  int32 maxzoom = 10;
  // Estimated size of the map data being shared in bytes
  uint64 estimatedSizeBytes = 11;
}
